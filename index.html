<!DOCTYPE html>
<html>

<head>
    <meta charset='utf-8' />
    <title>Resisting H2 Map</title>
    <meta name='viewport' content='initial-scale=1,maximum-scale=1,user-scalable=no' />
    <link rel="icon" type="image/x-icon"
        href="https://raw.githubusercontent.com/mapbox/assembly/publisher-staging/src/svgs/mapbox.svg">
    <script src='https://api.tiles.mapbox.com/mapbox-gl-js/v3.8.0/mapbox-gl.js'></script>
    <link href='https://api.tiles.mapbox.com/mapbox-gl-js/v3.8.0/mapbox-gl.css' rel='stylesheet' />
    <script src="https://cdn.jsdelivr.net/npm/mapbox-gl-globe-minimap@1.2.0/dist/bundle.js"></script>
    <script src="https://unpkg.com/scrollama"></script>
    <style>
        @font-face {
            font-family: 'Gap Sans';
            src: url('./fonts/GapSans.ttf') format('truetype');
            font-display: swap;
        }
        
        @font-face {
            font-family: 'Cotham Sans';
            src: url('./fonts/CothamSans.otf') format('opentype');
            font-display: swap;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: 'Cotham Sans', sans-serif;
        }
        h1, h2, h3 {
            font-family: 'Gap Sans', sans-serif;
            letter-spacing: 0.02em;
            text-transform: uppercase;
            font-weight: 700;
        }

        a,
        a:hover,
        a:visited {
            color: #0071bc;
        }

        #map {
            top: 0;
            height: 100vh;
            width: 100vw;
            position: fixed;
        }

        #header {
            margin: auto;
            width: 100%;
            position: relative;
            z-index: 5;
        }

        #header h1,
        #header h2,
        #header p {
            margin: 0;
            padding: 2vh 2vw;
            text-align: center;
        }

        #footer {
            width: 100%;
            min-height: 5vh;
            padding-top: 2vh;
            padding-bottom: 2vh;
            text-align: center;
            line-height: 25px;
            font-size: 13px;
            position: relative;
            z-index: 5;
        }

        #features {
            padding-top: 10vh;
            padding-bottom: 10vh;
        }

        .hidden {
            visibility: hidden;
        }

        .centered {
            width: 50vw;
            margin: 0 auto;
        }

        .lefty {
            width: 33vw;
            margin-left: 5vw;
        }

        .righty {
            width: 33vw;
            margin-left: 62vw;
        }

        .fully {
            width: 100%;
            margin: auto;
        }

        .light {
            color: #444;
            background-color: #fafafa;
        }
        
        .dark {
            color: #ffffff;
            background: rgba(58, 44, 103, 0.74);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 18px;
        }

        .step {
            padding: 30px;
            line-height: 1.7;
            font-size: 15px;
            border-radius: 4px;
            opacity: 0.4;
            margin-bottom: 60vh;
            transition: all 0.35s ease;
        }

        .step.active {
            opacity: 1;
            transform: translateY(-6px);
            transition: all 0.35s ease;
        }

        .step.active div {
            background: rgba(58, 44, 103, 0.65);
            box-shadow: 0 28px 70px rgba(0,0,0,0.35);
        }

        .step div {
            position: relative;
        
            padding: 32px 36px;
            border-radius: 18px;
        
            background: rgba(58, 44, 103, 0.70);
        
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
        
            border: 1px solid rgba(255,255,255,0.10);
        
            box-shadow: 0 18px 45px rgba(0,0,0,0.25);
        
            color: white;
        
            line-height: 1.75;
            font-size: 15px;
        }

        .step div::before {
            content: "";
            position: absolute;
            left: 0;
            top: 18px;
            bottom: 18px;
        
            width: 3px;
            border-radius: 2px;
        
            background: #d5e461;
            opacity: 0.85;
        }

        .step h3 {
            margin-top: 0;
            margin-bottom: 14px;
        
            font-size: 22px;
            letter-spacing: 0.04em;
        
            color: #d5e461;
            font-family: 'Gap Sans', sans-serif;
        }

        .step img {
            width: 100%;
        }
        
        .step iframe {
            width: 100%;
            aspect-ratio: 16 / 9;
            border: none;
            margin-top: 10px;
            /*border-radius: 10px;*/
        }
                        
        @media (max-width: 750px) {
            .centered,
            .lefty,
            .righty,
            .fully {
                width: 94vw;
                margin: 0 auto;
            }
        
            .step {
                margin-bottom: 35vh;
                padding: 10px;
            }
        
            .step div {
                padding: 22px;
            }
        }

        /* Fix issue on mobile browser where scroll breaks  */
        .mapboxgl-canvas-container.mapboxgl-touch-zoom-rotate.mapboxgl-touch-drag-pan,
        .mapboxgl-canvas-container.mapboxgl-touch-zoom-rotate.mapboxgl-touch-drag-pan .mapboxgl-canvas {
            touch-action: unset;
        }
    </style>
</head>

<body>

    <div id="map"></div>
    <div id="story"></div>

    <script src="./config.js"></script>
    <script>
        var initLoad = true;
        var layerTypes = {
            'fill': ['fill-opacity'],
            'line': ['line-opacity'],
            'circle': ['circle-opacity', 'circle-stroke-opacity'],
            'symbol': ['icon-opacity', 'text-opacity'],
            'raster': ['raster-opacity'],
            'fill-extrusion': ['fill-extrusion-opacity'],
            'heatmap': ['heatmap-opacity']
        }

        var alignments = {
            'left': 'lefty',
            'center': 'centered',
            'right': 'righty',
            'full': 'fully'
        }

        function getLayerPaintType(layer) {
            var layerType = map.getLayer(layer).type;
            return layerTypes[layerType];
        }

        function setLayerOpacity(layer) {
            var paintProps = getLayerPaintType(layer.layer);
            paintProps.forEach(function (prop) {
                var options = {};
                if (layer.duration) {
                    var transitionProp = prop + "-transition";
                    options = { "duration": layer.duration };
                    map.setPaintProperty(layer.layer, transitionProp, options);
                }
                map.setPaintProperty(layer.layer, prop, layer.opacity, options);
            });

                if (layer.color) {
                var layerType = map.getLayer(layer.layer).type;

                if (layerType === 'line') {
                    map.setPaintProperty(layer.layer, 'line-color', layer.color);
                }
                if (layerType === 'fill') {
                    map.setPaintProperty(layer.layer, 'fill-color', layer.color);
                }
                if (layerType === 'circle') {
                    map.setPaintProperty(layer.layer, 'circle-color', layer.color);
                }
            }
        }

        var story = document.getElementById('story');
        var features = document.createElement('div');
        features.setAttribute('id', 'features');

        var header = null;
        //var header = document.createElement('div');

        /*if (config.title) {
            var titleText = document.createElement('h1');
            titleText.innerText = config.title;
            header.appendChild(titleText);
        }

        if (config.subtitle) {
            var subtitleText = document.createElement('h2');
            subtitleText.innerText = config.subtitle;
            header.appendChild(subtitleText);
        }

        if (config.byline) {
            var bylineText = document.createElement('p');
            bylineText.innerText = config.byline;
            header.appendChild(bylineText);
        }

        if (header.innerText.length > 0) {
            header.classList.add(config.theme);
            header.setAttribute('id', 'header');
            story.appendChild(header);
        }*/

        config.chapters.forEach((record, idx) => {
            var container = document.createElement('div');
            var chapter = document.createElement('div');

            if (record.title) {
                var title = document.createElement('h3');
                title.innerText = record.title;
                chapter.appendChild(title);
            }

            if (record.image) {
                var image = new Image();
                image.src = record.image;
                chapter.appendChild(image);
            }

            if (record.video) {
                var iframe = document.createElement('iframe');
                iframe.src = record.video;
                iframe.loading = "lazy";
                iframe.allowFullscreen = true;
                iframe.setAttribute("allow", "fullscreen");
                chapter.appendChild(iframe);
            }

            if (record.description) {
                var story = document.createElement('p');
                story.innerHTML = record.description;
                chapter.appendChild(story);
            }

            container.setAttribute('id', record.id);
            container.classList.add('step');
            if (idx === 0) {
                container.classList.add('active');
            }

            chapter.classList.add(config.theme);
            container.appendChild(chapter);
            container.classList.add(alignments[record.alignment] || 'centered');
            if (record.hidden) {
                container.classList.add('hidden');
            }
            features.appendChild(container);
        });
        story.appendChild(features);

        /*var footer = document.createElement('div');

        if (config.footer) {
            var footerText = document.createElement('p');
            footerText.innerHTML = config.footer;
            footer.appendChild(footerText);
        }

        if (footer.innerText.length > 0) {
            footer.classList.add(config.theme);
            footer.setAttribute('id', 'footer');
            story.appendChild(footer);
        }*/

        mapboxgl.accessToken = config.accessToken;

        var map = new mapboxgl.Map({
            container: 'map',
            style: config.style,
            center: config.chapters[0].location.center,
            zoom: config.chapters[0].location.zoom,
            bearing: config.chapters[0].location.bearing,
            pitch: config.chapters[0].location.pitch,
            interactive: false,
            projection: config.projection
        });

        // Create a inset map if enabled in config.js
        if (config.inset) {
            map.addControl(
                new GlobeMinimap({ ...config.insetOptions }),
                config.insetPosition
            );
        }

        if (config.showMarkers) {
            var marker = new mapboxgl.Marker({ color: config.markerColor });
            marker.setLngLat(config.chapters[0].location.center).addTo(map);
        }

        // instantiate the scrollama
        var scroller = scrollama();


        map.on("load", function () {
            
            map.addSource('PointResist', {
                    'type': 'geojson',
                    data : './data/points-of-resistance.geojson'
            });
            map.addSource('BarMar', {
                    'type': 'geojson',
                    data : './data/BarMar.geojson'
            });
            map.addSource('FraGer', {
                    'type': 'geojson',
                    data : './data/FraGer-connector-north.geojson'
            });
            map.addSource('FraSide', {
                    'type': 'geojson',
                    data : './data/france_side-axis.geojson'
            });
            map.addSource('IberSide', {
                    'type': 'geojson',
                    data : './data/iberian_peninsula-side_axis.geojson'
            });
            map.addSource('SHB_core', {
                    'type': 'geojson',
                    data : './data/SHB_core.geojson'
            });
            map.addSource('HuelvaXixon', {
                    'type': 'geojson',
                    data : './data/SHB_HueXi.geojson'
            });
            map.addSource('SoutH2Link', {
                    'type': 'geojson',
                    data : './data/SoutH2Link_complete.geojson'
            });
            map.addSource('LaMudarraLines', {
                    'type': 'geojson',
                    data : './data/la_mudarra-power_lines.geojson'
            });
            map.addSource('damsExtr', {
                    'type': 'geojson',
                    data : './data/dams_extremadura_ALL_POINT.geojson'
            });
            map.addSource('reservoirsExtr', {
                    'type': 'geojson',
                    data : './data/embalses_extremadura.geojson'
            });
            map.addSource('solarsExtr', {
                    'type': 'geojson',
                    data : './data/almaraz_solar-fields.geojson'
            });
            map.addSource('nuclearExtr', {
                    'type': 'geojson',
                    data : './data/almaraz_nuclear_POINT.geojson'
            });
            
            
                // add the pipeline as layer to the map
            map.loadImage('./assets/storymap-point-symbol.png', (error, image) => {
                if (error) throw error;
        
                if (!map.hasImage('point-symbol')) {
                    map.addImage('point-symbol', image);
                }
        
                map.addLayer({
                    id: 'PointResist',
                    type: 'symbol',
                    source: 'PointResist',
                    layout: {
                        'icon-image': 'point-symbol',
                        'icon-size': 0.6,
                        'icon-anchor': 'bottom',
                        'icon-allow-overlap': true
                    },
                    paint: {
                        'icon-opacity': 0 
                    }
                });
            });
            map.loadImage('./assets/rect_fill_strokes.png', (error, image) => {
                if (error) throw error;
        
                if (!map.hasImage('diagonal-pattern')) {
                    map.addImage('diagonal-pattern', image);
                }
                map.addLayer({
                    id: 'strokes',
                    type: 'fill',
                    source: 'reservoirsExtr',
                    paint: {
                        'fill-pattern': 'diagonal-pattern',
                        'fill-opacity': 0
                    }
                });
            });
            map.loadImage('./assets/rect_fill_squares.png', (error, image) => {
                if (error) throw error;
        
                if (!map.hasImage('square-pattern')) {
                    map.addImage('square-pattern', image);
                }
                map.addLayer({
                    id: 'squares',
                    type: 'fill',
                    source: 'solarsExtr',
                    paint: {
                        'fill-pattern': 'square-pattern',
                        'fill-opacity': 0
                    }
                });
            });
           /*
               map.loadImage('./assets/radioactive.png', (error, image) => {
                if (error) throw error;
        
                if (!map.hasImage('nuclear-icon')) {
                    map.addImage('nuclear-icon', image);
                }
                map.addLayer({
                    id: 'nuclear',
                    type: 'symbol',
                    source: 'nuclearExtr',
                    layout: {
                        'icon-image': 'nuclear-icon',
                        'icon-size': 0.6,
                        'icon-anchor': 'bottom',
                        'icon-allow-overlap': true
                    },
                    paint: {
                        'icon-opacity': 0 
                    }
                });
            });*/

            map.addLayer({
                    id: 'squares',
                    type: 'fill',
                    source: 'solarsExtr',
                    paint: {
                        'fill-pattern': 'square-pattern',
                        'fill-opacity': 0
                    }
                });

            map.addLayer({
                id: 'solars-outline',
                type: 'line',
                source: 'solarsExtr',
                layout: {
                    'line-join': 'round',
                    'line-cap': 'round'
                },
                paint: {
                    'line-color': '#d5e461',
                    'line-opacity': 0,
                    'line-width': 0.8
                 }
            });
            
            map.addLayer({
                id: 'nuclear-labels',
                type: 'symbol',
                source: 'nuclearExtr',
                layout: {
                    'text-field': ['get', 'label'],
                    'text-size': 14,
                    'text-anchor': 'top',
                    'text-offset': [0, 1],
                    'text-allow-overlap': true
                },
                paint: {
                    'text-color': '#ffffff',
                    'text-halo-color': '#000000',
                    'text-halo-width': 1,
                    'text-opacity': 0,   // important for your storytelling setup
                    'icon-opacity': 0
                }
            });
            map.addLayer({
                    id: 'damsExtr',
                    type: 'circle',
                    source: 'damsExtr',
                    paint: {
                        'circle-radius': 5,
                        'circle-color': '#3FB1CE',
                        'circle-opacity': 0 
                    }
            });
            map.addLayer({
                id: 'reservoirsExtrFill',
                type: 'fill',
                source: 'reservoirsExtr',
                paint: {
                    'fill-color': '#d5e461',
                    'fill-opacity': 0
                }
            });
            map.addLayer({
                id: 'reservoirsExtrLine',
                type: 'line',
                source: 'reservoirsExtr',
                layout: {
                    'line-join': 'round',
                    'line-cap': 'round'
                },
                paint: {
                    'line-color': '#d5e461',
                    'line-opacity': 0,
                    'line-width': 0.8
                }
            });
            map.addLayer({
                id: 'BarMar',
                type: 'line',
                source: 'BarMar',
                layout: {
                    'line-join': 'round',
                    'line-cap': 'round'
                },
                paint: {
                    'line-color': '#d5e461',
                    'line-width': 4,
                    'line-opacity': 1
                }
            });
            map.addLayer({
                id: 'FraGer',
                type: 'line',
                source: 'FraGer',
                layout: {
                    'line-join': 'round',
                    'line-cap': 'round'
                },
                paint: {
                    'line-color': '#d5e461',
                    'line-width': 4,
                    'line-opacity': 1
                }
            });
            map.addLayer({
                id: 'FraSide',
                type: 'line',
                source: 'FraSide',
                layout: {
                    'line-join': 'round',
                    'line-cap': 'round'
                },
                paint: {
                    'line-color': '#d5e461',
                    'line-width': 2,
                    'line-opacity': 1
                }
            });
            map.addLayer({
                id: 'IberSide',
                type: 'line',
                source: 'IberSide',
                layout: {
                    'line-join': 'round',
                    'line-cap': 'round'
                },
                paint: {
                    'line-color': '#d5e461',
                    'line-width': 2,
                    'line-opacity': 1
                }
            });
            map.addLayer({
                id: 'SHB_core',
                type: 'line',
                source: 'SHB_core',
                layout: {
                    'line-join': 'round',
                    'line-cap': 'round'
                },
                paint: {
                    'line-color': '#d5e461',
                    'line-width': 4,
                    'line-opacity': 1
                }
            });
            map.addLayer({
                id: 'HuelvaXixon',
                type: 'line',
                source: 'HuelvaXixon',
                layout: {
                    'line-join': 'round',
                    'line-cap': 'round'
                },
                paint: {
                    'line-color': '#d5e461',
                    'line-width': 4,
                    'line-opacity': 0
                }
            });
           map.addLayer({
                id: 'SoutH2Link',
                type: 'line',
                source: 'SoutH2Link',
                layout: {
                    'line-join': 'round',
                    'line-cap': 'round'
                },
                paint: {
                    'line-color': '#d5e461',
                    'line-width': 4,
                    'line-opacity': 1
                }
            });
            map.addLayer({
                id: 'LaMudarraLines',
                type: 'line',
                source: 'LaMudarraLines',
                layout: {
                    'line-join': 'round',
                    'line-cap': 'round'
                },
                paint: {
                    'line-color': '#d5e461',
                    'line-width': 1,
                    'line-opacity': 0
                }
            });
            
        

            if (config.use3dTerrain) {
                map.addSource('mapbox-dem', {
                    'type': 'raster-dem',
                    'url': 'mapbox://mapbox.mapbox-terrain-dem-v1',
                    'tileSize': 512,
                    'maxzoom': 14
                });

                // add the DEM source as a terrain layer with exaggerated height
                map.setTerrain({ 'source': 'mapbox-dem', 'exaggeration': 1.5 });

                // add a sky layer that will show when the map is highly pitched
                map.addLayer({
                    'id': 'sky',
                    'type': 'sky',
                    'paint': {
                        'sky-type': 'atmosphere',
                        'sky-atmosphere-sun': [0.0, 0.0],
                        'sky-atmosphere-sun-intensity': 15
                    }
                });
            };

            // setup the instance, pass callback functions
            scroller
                .setup({
                    step: '.step',
                    offset: 0.75,
                    progress: true
                })
                .onStepEnter(async response => {
                    var current_chapter = config.chapters.findIndex(chap => chap.id === response.element.id);
                    var chapter = config.chapters[current_chapter];

                    response.element.classList.add('active');
                    map[chapter.mapAnimation || 'flyTo'](chapter.location);

                    if (config.showMarkers) {
                        marker.setLngLat(chapter.location.center);
                    }
                    if (chapter.onChapterEnter.length > 0) {
                        chapter.onChapterEnter.forEach(setLayerOpacity);
                    }
                    if (chapter.callback) {
                        window[chapter.callback]();
                    }
                    if (chapter.rotateAnimation) {
                        map.once('moveend', () => {
                            const rotateNumber = map.getBearing();
                            map.rotateTo(rotateNumber + 180, {
                                duration: 30000, easing: function (t) {
                                    return t;
                                }
                            });
                        });
                    }
                    if (config.auto) {
                        var next_chapter = (current_chapter + 1) % config.chapters.length;
                        map.once('moveend', () => {
                            document.querySelectorAll('[data-scrollama-index="' + next_chapter.toString() + '"]')[0].scrollIntoView();
                        });
                    }
                })
                .onStepExit(response => {
                    var chapter = config.chapters.find(chap => chap.id === response.element.id);
                    response.element.classList.remove('active');
                    if (chapter.onChapterExit.length > 0) {
                        chapter.onChapterExit.forEach(setLayerOpacity);
                    }
                });


            if (config.auto) {
                document.querySelectorAll('[data-scrollama-index="0"]')[0].scrollIntoView();
            }
        });

    </script>

</body>

</html>
